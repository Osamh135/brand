<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عبايات براند توب</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gold: #d4af37;
            --primary-dark: #1a1a1a;
            --secondary-dark: #2d2d2d;
            --text-light: #f5f5f5;
            --text-muted: #b0b0b0;
            --border-color: #404040;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--primary-dark);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.85) 0%, rgba(45, 45, 45, 0.85) 100%),
                        url('https://d2xsxph8kpxj0f.cloudfront.net/310519663272195676/jf3U2ezrqVedU5W62VY54u/black-abayas-background-kqf52uUQ5QB5ju8xKJZD2L.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 800px;
            padding: 40px 20px;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            color: var(--primary-gold);
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            letter-spacing: 2px;
            animation: fadeInUp 1s ease-out 0.2s both;
        }

        .hero-subtitle {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            color: var(--text-light);
            margin-bottom: 30px;
            font-weight: 500;
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        .hero-tagline {
            font-size: 1.3rem;
            color: var(--primary-gold);
            margin-bottom: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .hero-tagline span {
            font-size: 1.5rem;
        }

        /* Buttons Container */
        .buttons-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-out 0.8s both;
        }

        .social-button {
            padding: 20px 30px;
            border: 4px solid var(--primary-gold);
            background-color: var(--text-light);
            color: var(--primary-dark);
            font-family: 'Tajawal', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.15);
            position: relative;
            overflow: hidden;
        }

        .social-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .social-button:hover::before {
            left: 100%;
        }

        .social-button:hover {
            background-color: var(--primary-gold);
            color: var(--primary-dark);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.3);
        }

        .social-button:active {
            transform: translateY(-1px) scale(1.02);
        }

        .social-button svg {
            width: 24px;
            height: 24px;
            stroke-width: 2;
        }

        .community-button {
            grid-column: 1 / -1;
            max-width: 400px;
            margin: 0 auto;
            width: 100%;
        }

        /* Phone Button */
        .phone-button {
            padding: 18px 40px;
            background: linear-gradient(135deg, var(--primary-gold) 0%, #c9a227 100%);
            color: var(--primary-dark);
            font-family: 'Tajawal', sans-serif;
            font-size: 1.2rem;
            font-weight: 900;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            box-shadow: 0 10px 35px rgba(212, 175, 55, 0.25);
            animation: fadeInUp 1s ease-out 1s both;
            letter-spacing: 1px;
        }

        .phone-button:hover {
            transform: translateY(-5px) scale(1.08);
            box-shadow: 0 20px 50px rgba(212, 175, 55, 0.4);
        }

        .phone-button:active {
            transform: translateY(-2px) scale(1.04);
        }

        .phone-button span:first-child {
            font-size: 1.5rem;
        }

        /* Footer */
        footer {
            background-color: rgba(26, 26, 26, 0.95);
            border-top: 2px solid var(--border-color);
            padding: 30px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .hero {
                min-height: 100vh;
                padding: 20px;
            }

            .hero-content {
                padding: 20px;
            }

            .buttons-container {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .community-button {
                grid-column: 1;
            }

            .hero-title {
                margin-bottom: 15px;
            }

            .hero-subtitle {
                margin-bottom: 20px;
            }

            .hero-tagline {
                margin-bottom: 30px;
            }

            .social-button {
                padding: 16px 24px;
                font-size: 1rem;
            }

            .phone-button {
                padding: 16px 32px;
                font-size: 1.1rem;
            }
        }

        @media (max-width: 480px) {
            .hero-title {
                font-size: 2rem;
                letter-spacing: 1px;
            }

            .hero-subtitle {
                font-size: 1rem;
            }

            .hero-tagline {
                font-size: 1rem;
            }

            .social-button {
                padding: 14px 20px;
                font-size: 0.95rem;
                gap: 8px;
            }

            .phone-button {
                padding: 14px 24px;
                font-size: 1rem;
            }

            .phone-button span:first-child {
                font-size: 1.2rem;
            }
        }

        /* Smooth Scroll Behavior */
        a {
            color: inherit;
            text-decoration: none;
        }

        /* Focus styles for accessibility */
        button:focus,
        a:focus {
            outline: 2px solid var(--primary-gold);
            outline-offset: 2px;
        }

        /* Loading animation */
        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }
            100% {
                background-position: 1000px 0;
            }
        }

        /* Decorative elements */
        .decoration {
            position: absolute;
            opacity: 0.1;
            pointer-events: none;
        }

        .decoration-top {
            top: 10%;
            right: 5%;
            width: 200px;
            height: 200px;
            border: 2px solid var(--primary-gold);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .decoration-bottom {
            bottom: 10%;
            left: 5%;
            width: 150px;
            height: 150px;
            border: 2px solid var(--primary-gold);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(20px);
            }
        }

        /* Gradient text effect */
        .gradient-text {
            background: linear-gradient(135deg, var(--primary-gold) 0%, #f5f5f5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body>
    <!-- Hero Section -->

    <!-- Footer -->

    <script>
        // Smooth animations on scroll
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver(function(entries) {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);

        // Add hover effects for buttons
        const buttons = document.querySelectorAll('.social-button, .phone-button');
        buttons.forEach(button => {
            button.addEventListener('mouseenter', function() {
                this.style.transform = this.classList.contains('phone-button') 
                    ? 'translateY(-5px) scale(1.08)' 
                    : 'translateY(-3px) scale(1.05)';
            });
            
            button.addEventListener('mouseleave', function() {
                this.style.transform = 'translateY(0) scale(1)';
            });
        });

        // Prevent default behavior for social links if needed
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                // Allow normal link behavior
            });
        });
    </script>
</body>
</html>
